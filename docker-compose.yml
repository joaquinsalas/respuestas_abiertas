services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DATABASE_NAME}
      POSTGRES_USER:     ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # Consola de administración (solo para gestión)
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MinIO Init (crea el bucket una sola vez) ──────────────────────────────────
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/user-graphs &&
        echo 'Bucket user-graphs listo.'
      "
    networks:
      - internal

  # ── RabbitMQ ──────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER:     ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS:     ${RABBITMQ_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Django + Gunicorn ─────────────────────────────────────────────────────────
  django:
    build:
      context: ./resAb
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY}
      DEBUG:                ${DEBUG:-False}
      ALLOWED_HOSTS:        ${ALLOWED_HOSTS}
      SECURE_SSL_REDIRECT:  ${SECURE_SSL_REDIRECT:-False}

      DATABASE_NAME:        ${DATABASE_NAME}
      DATABASE_USER:        ${DATABASE_USER}
      DATABASE_PASSWORD:    ${DATABASE_PASSWORD}
      DATABASE_HOST:        db
      DATABASE_PORT:        5432

      AWS_ACCESS_KEY_ID:    ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION:   ${AWS_DEFAULT_REGION:-us-east-1}
      MINIO_ENDPOINT_URL:   http://minio:9000

      api_key_openai:       ${api_key_openai}
      CELERY_BROKER_URL:    amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672//
      CELERY_RESULT_BACKEND: django-db
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./resAb
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A resAb worker --loglevel=info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY}
      DEBUG:                ${DEBUG:-False}

      DATABASE_NAME:        ${DATABASE_NAME}
      DATABASE_USER:        ${DATABASE_USER}
      DATABASE_PASSWORD:    ${DATABASE_PASSWORD}
      DATABASE_HOST:        db
      DATABASE_PORT:        5432

      AWS_ACCESS_KEY_ID:    ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION:   ${AWS_DEFAULT_REGION:-us-east-1}
      MINIO_ENDPOINT_URL:   http://minio:9000

      api_key_openai:       ${api_key_openai}
      CELERY_BROKER_URL:    amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672//
      CELERY_RESULT_BACKEND: django-db
    networks:
      - internal

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      django:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

# ── Redes ──────────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge

# ── Volúmenes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:
